# =============================================================================
# 武士団マルチエージェントシステム v10.1 - MCP Permission Matrix
# =============================================================================
# 役職別MCP使用権限・優先度設定
#
# 設計原則:
#   1. 専属MCP: その役職のみが使用権限を持つ（他は要請が必要）
#   2. 優先MCP: その役職が優先的にアクセス可能
#   3. 共有MCP: 複数役職が等しく使用可能
#   4. 禁止MCP: その役職には不適切（セキュリティ/役割分離）
#
# アクセスレベル:
#   exclusive: 専属（他役職は request 経由でのみ使用可能）
#   primary:   優先（他役職も使用可能だが、この役職が優先される）
#   secondary: 補助（必要に応じて使用可能）
#   readonly:  読み取り専用（監視・分析目的）
#   forbidden: 使用禁止（役割分離のため）
# =============================================================================

version: "10.1"
description: "役職別MCP権限マトリクス - 各役職の存在理由を最大化"

# =============================================================================
# MCP一覧と基本説明
# =============================================================================
mcp_registry:
  sequential_thinking:
    category: "AI"
    description: "動的思考チェーン - 分岐・修正可能な推論"
    cost_per_use: 0

  playwright:
    category: "BROWSER"
    description: "ブラウザ操作・スクリーンショット取得"
    cost_per_use: 0
    requires_network: true

  tavily:
    category: "SEARCH"
    description: "Web検索 (1,000回/月 無料枠)"
    cost_per_use: 0
    monthly_limit: 1000
    requires_network: true

  exa:
    category: "SEARCH"
    description: "セマンティック検索"
    cost_per_use: 0.01
    requires_network: true
    optional: true

  filesystem:
    category: "DATA"
    description: "ファイル読み書き操作"
    cost_per_use: 0
    security_level: "high"

  graph_memory:
    category: "DATA"
    description: "グラフ型記憶 - エンティティ関係管理"
    cost_per_use: 0
    optional: true

  prisma:
    category: "DATA"
    description: "データベース操作 (Prisma ORM)"
    cost_per_use: 0
    security_level: "high"
    optional: true

  notion:
    category: "INTEGRATION"
    description: "Notion連携 - ドキュメント管理"
    cost_per_use: 0
    requires_token: true
    optional: true

  git:
    category: "INTEGRATION"
    description: "Git操作 - バージョン管理"
    cost_per_use: 0
    security_level: "medium"

# =============================================================================
# 役職別MCP権限マトリクス
# =============================================================================
role_permissions:

  # ---------------------------------------------------------------------------
  # 将軍 (Shogun) - 戦略層
  # ---------------------------------------------------------------------------
  # 役割: 複雑度判断・戦略的設計・最終品質検品・チーム統率
  # 特徴: 全体を俯瞰し、最終判断を下す。直接実装には関与しない。
  # ---------------------------------------------------------------------------
  shogun:
    description: "戦略的意思決定者 - 全体俯瞰と最終判断"

    permissions:
      graph_memory:
        level: "primary"
        reason: "過去の戦略的判断・学習履歴の管理"
        use_cases:
          - "過去の類似タスクの成功/失敗パターン参照"
          - "アーキテクチャ決定の履歴記録"
          - "品質基準の学習・更新"

      notion:
        level: "primary"
        reason: "プロジェクト方針・ドキュメント管理の最終権限"
        use_cases:
          - "設計ドキュメントの承認・更新"
          - "品質基準の文書化"
          - "プロジェクト履歴の記録"

      sequential_thinking:
        level: "secondary"
        reason: "複雑な戦略的判断の支援"
        use_cases:
          - "多段階の意思決定プロセス"
          - "リスク分析の構造化"

      filesystem:
        level: "readonly"
        reason: "コード監査・品質確認（変更は行わない）"

      git:
        level: "readonly"
        reason: "変更履歴の監視・レビュー"

      tavily:
        level: "secondary"
        reason: "最新技術動向・ベストプラクティス調査"

      playwright:
        level: "forbidden"
        reason: "実装層の責務（検校に委譲）"

      prisma:
        level: "forbidden"
        reason: "実装層の責務（大将に委譲）"

      exa:
        level: "secondary"
        reason: "高度な情報検索が必要な場合のみ"

  # ---------------------------------------------------------------------------
  # 軍師 (Gunshi) - 作戦立案層
  # ---------------------------------------------------------------------------
  # 役割: PDCA作戦立案・コード監査・複雑タスク分解
  # 特徴: 256K contextで全体を俯瞰し、戦術的計画を立案
  # ---------------------------------------------------------------------------
  gunshi:
    description: "作戦立案者 - PDCA設計と品質検証"

    permissions:
      sequential_thinking:
        level: "exclusive"
        reason: "PDCA Plan/Check フェーズの中核"
        use_cases:
          - "複雑タスクの分解戦略立案"
          - "サブタスク間依存関係の分析"
          - "Check フェーズの検証ロジック構築"
          - "修正戦略の策定"
        priority: 1  # 最優先

      filesystem:
        level: "primary"
        reason: "コードベース全体の分析・監査"
        use_cases:
          - "Plan: 既存コード構造の把握"
          - "Check: 実装結果の検証"
          - "cross-file 整合性確認"

      git:
        level: "primary"
        reason: "変更履歴分析・影響範囲特定"
        use_cases:
          - "関連ファイルの変更履歴確認"
          - "リグレッションリスク評価"

      graph_memory:
        level: "primary"
        reason: "アーキテクチャ知識の蓄積・参照"
        use_cases:
          - "過去の設計パターン参照"
          - "コンポーネント関係の記憶"

      tavily:
        level: "secondary"
        reason: "技術調査（Plan フェーズ）"

      exa:
        level: "secondary"
        reason: "高度なコード検索・類似実装検索"

      notion:
        level: "secondary"
        reason: "設計ドキュメント参照"

      playwright:
        level: "forbidden"
        reason: "検校の専属MCP"

      prisma:
        level: "readonly"
        reason: "DB構造の確認のみ（変更は大将）"

  # ---------------------------------------------------------------------------
  # 家老 (Karo) - 戦術調整層
  # ---------------------------------------------------------------------------
  # 役割: タスク分解・サブタスク調整・並列実行管理
  # 特徴: 中間管理として上位の指示を下位に適切に伝達
  # ---------------------------------------------------------------------------
  karo:
    description: "戦術調整者 - タスク分解と実行調整"

    permissions:
      sequential_thinking:
        level: "primary"
        reason: "タスク分解・優先度判断"
        use_cases:
          - "サブタスクへの分解ロジック"
          - "実行順序の最適化"
          - "依存関係の解決"
        priority: 2  # 軍師の次に優先

      filesystem:
        level: "secondary"
        reason: "タスクコンテキスト把握"

      graph_memory:
        level: "secondary"
        reason: "タスクパターンの記憶"

      git:
        level: "readonly"
        reason: "変更状況の監視"

      tavily:
        level: "forbidden"
        reason: "調査は軍師の責務"

      exa:
        level: "forbidden"
        reason: "調査は軍師の責務"

      playwright:
        level: "forbidden"
        reason: "検校の専属MCP"

      prisma:
        level: "forbidden"
        reason: "大将の責務"

      notion:
        level: "readonly"
        reason: "設計ドキュメント参照のみ"

  # ---------------------------------------------------------------------------
  # 大将 (Taisho) - 実装層
  # ---------------------------------------------------------------------------
  # 役割: 実務実装・コード生成・MCP駆使
  # 特徴: 4層フォールバックで実装を確実に完遂
  # ---------------------------------------------------------------------------
  taisho:
    description: "実装責任者 - コード生成と永続化"

    permissions:
      filesystem:
        level: "exclusive"
        reason: "コード生成・ファイル操作の主担当"
        use_cases:
          - "新規ファイル作成"
          - "既存ファイル編集"
          - "設定ファイル更新"
          - "テストファイル生成"
        priority: 1

      git:
        level: "exclusive"
        reason: "バージョン管理操作の主担当"
        use_cases:
          - "コミット作成"
          - "ブランチ操作"
          - "差分確認"
        priority: 1

      prisma:
        level: "exclusive"
        reason: "データベース操作の主担当"
        use_cases:
          - "スキーマ変更"
          - "マイグレーション実行"
          - "データ操作"

      sequential_thinking:
        level: "secondary"
        reason: "実装判断の支援"
        priority: 3  # 軍師・家老の後

      graph_memory:
        level: "secondary"
        reason: "実装パターンの記憶・参照"

      tavily:
        level: "forbidden"
        reason: "調査は上位層の責務"

      exa:
        level: "forbidden"
        reason: "調査は上位層の責務"

      notion:
        level: "forbidden"
        reason: "ドキュメント管理は将軍の責務"

      playwright:
        level: "forbidden"
        reason: "検校の専属MCP"

  # ---------------------------------------------------------------------------
  # 検校 (Kengyo) - ビジュアル検証層
  # ---------------------------------------------------------------------------
  # 役割: UI/UXのビジュアル検証・スクリーンショット解析
  # 特徴: Kimi K2.5 Vision + Playwright MCPの組み合わせ
  # ---------------------------------------------------------------------------
  kengyo:
    description: "ビジュアル検証者 - UI品質保証"

    permissions:
      playwright:
        level: "exclusive"
        reason: "スクリーンショット取得の専属担当"
        use_cases:
          - "ページキャプチャ"
          - "マルチビューポート撮影"
          - "Before/After比較用撮影"
          - "要素スクリーンショット"
        priority: 1
        exclusive_reason: "他役職はビジュアル検証が必要な場合、検校に依頼する"

      filesystem:
        level: "primary"
        reason: "検証レポート・スクリーンショット保存"
        use_cases:
          - "検証レポートの出力"
          - "スクリーンショットの保存"
          - "比較結果の記録"

      graph_memory:
        level: "secondary"
        reason: "ビジュアル検証パターンの記憶"

      sequential_thinking:
        level: "forbidden"
        reason: "複雑な推論は軍師の責務"

      git:
        level: "readonly"
        reason: "変更ファイルの確認（UI関連）"

      tavily:
        level: "forbidden"
        reason: "調査は上位層の責務"

      exa:
        level: "forbidden"
        reason: "調査は上位層の責務"

      notion:
        level: "forbidden"
        reason: "ドキュメント管理は将軍の責務"

      prisma:
        level: "forbidden"
        reason: "大将の責務"

  # ---------------------------------------------------------------------------
  # 足軽 (Ashigaru) - 実行層
  # ---------------------------------------------------------------------------
  # 役割: MCP実行・並列処理のワーカー
  # 特徴: 上位役職からの指示に基づいて実行
  # ---------------------------------------------------------------------------
  ashigaru:
    description: "実行ワーカー - 指示に基づくMCP操作"

    permissions:
      # 足軽は直接MCPにアクセスしない
      # 上位役職（主に大将）からの指示を受けて実行する
      _note: "足軽はMCPの直接アクセス権を持たない。上位役職の指示に基づいて実行する。"

      filesystem:
        level: "delegated"
        delegated_from: ["taisho"]
        reason: "大将からの指示に基づくファイル操作"

      git:
        level: "delegated"
        delegated_from: ["taisho"]
        reason: "大将からの指示に基づくGit操作"

      playwright:
        level: "delegated"
        delegated_from: ["kengyo"]
        reason: "検校からの指示に基づくブラウザ操作"

      prisma:
        level: "delegated"
        delegated_from: ["taisho"]
        reason: "大将からの指示に基づくDB操作"

# =============================================================================
# MCP優先度解決ルール
# =============================================================================
priority_resolution:
  description: "複数役職が同時にMCPを要求した場合の解決ルール"

  rules:
    - rule: "exclusive > primary > secondary > readonly > delegated"
      description: "アクセスレベルによる優先度"

    - rule: "higher_tier_priority"
      description: "同レベルの場合、上位役職を優先"
      tier_order:
        - shogun
        - gunshi
        - karo
        - taisho
        - kengyo
        - ashigaru

    - rule: "task_context_priority"
      description: "タスクコンテキストに基づく動的優先度調整"
      examples:
        - context: "visual_check"
          boost: ["kengyo"]
        - context: "code_review"
          boost: ["gunshi"]
        - context: "implementation"
          boost: ["taisho"]

# =============================================================================
# MCP使用制限
# =============================================================================
usage_limits:
  tavily:
    monthly_limit: 1000
    per_task_limit: 10
    warning_threshold: 800

  exa:
    monthly_budget_yen: 100
    per_task_limit: 5

  sequential_thinking:
    max_depth: 10
    max_branches: 5
    timeout_seconds: 60

# =============================================================================
# セキュリティポリシー
# =============================================================================
security:
  filesystem:
    allowed_paths:
      - "${PROJECT_ROOT}"
      - "${HOME}/.config/bushidan"
    forbidden_paths:
      - "/etc"
      - "/root"
      - "${HOME}/.ssh"
      - "${HOME}/.gnupg"
    forbidden_patterns:
      - "*.env"
      - "*credentials*"
      - "*secret*"
      - "*.pem"
      - "*.key"

  git:
    forbidden_operations:
      - "push --force"
      - "reset --hard"
      - "clean -f"
    protected_branches:
      - "main"
      - "master"
      - "production"

  prisma:
    require_confirmation:
      - "DROP"
      - "DELETE"
      - "TRUNCATE"
