global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # 武士団コンソール (FastAPI /metrics)
  - job_name: "bushidan_console"
    static_configs:
      - targets: ["192.168.11.231:8067"]
    metrics_path: /metrics

  # Prometheus 自己監視
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
