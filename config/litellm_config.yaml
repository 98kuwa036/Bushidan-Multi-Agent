# ============================================================================
# Bushidan v11.4 - LiteLLM Proxy Configuration
# 脱中国企業: Alibaba/Qwen/Kimi 全排除
# ============================================================================

model_list:
  # 大元帥 (Daigensui) - Claude Opus 4.5
  - model_name: claude-opus-4-5
    litellm_params:
      model: claude-opus-4-5-20250514
      api_key: os.environ/CLAUDE_API_KEY
      max_tokens: 8192

  # 将軍 (Shogun) - Claude Sonnet 4.6
  - model_name: claude-sonnet-4-6
    litellm_params:
      model: claude-sonnet-4-6
      api_key: os.environ/CLAUDE_API_KEY
      max_tokens: 8192

  # 軍師 (Gunshi) - o3-mini
  - model_name: o3-mini
    litellm_params:
      model: openai/o3-mini
      api_key: os.environ/OPENAI_API_KEY
      max_tokens: 8192

  # 参謀-A (Sanbo-A) - GPT-5
  - model_name: gpt-5
    litellm_params:
      model: openai/gpt-5
      api_key: os.environ/OPENAI_API_KEY
      max_tokens: 8192

  # 参謀-B (Sanbo-B) - Grok-code-fast-1
  - model_name: grok-code-fast-1
    litellm_params:
      model: openai/grok-code-fast-1
      api_base: https://api.x.ai/v1
      api_key: os.environ/XAI_API_KEY
      max_tokens: 8192

  # 家老-A (Karo-A) - Gemini Flash
  - model_name: gemini-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
      max_tokens: 2000

  # 家老-B (Karo-B) - Llama 3.3 70B via Groq
  - model_name: llama-3.3-70b
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
      max_tokens: 2000

  # 検校 (Kengyo) - Gemini Flash Vision (multimodal)
  - model_name: gemini-flash-vision
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
      max_tokens: 2000

  # 隠密 (Onmitsu) - Nemotron-3-Nano (local llama.cpp)
  - model_name: nemotron-3-nano
    litellm_params:
      model: openai/nemotron-3-nano
      api_base: http://192.168.11.232:8080/v1
      api_key: "none"
      max_tokens: 4096

litellm_settings:
  drop_params: True
  set_verbose: False
  num_retries: 2
  request_timeout: 300

  max_budget: 100
  budget_duration: "30d"

  context_window_fallbacks:
    - model: "claude-sonnet-4-6"
      context_window: 200000
    - model: "o3-mini"
      context_window: 128000
    - model: "gpt-5"
      context_window: 128000
    - model: "grok-code-fast-1"
      context_window: 128000
    - model: "gemini-flash"
      context_window: 1000000
    - model: "llama-3.3-70b"
      context_window: 131072
    - model: "nemotron-3-nano"
      context_window: 8192

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/LITELLM_DATABASE_URL

router_settings:
  routing_strategy: "simple-shuffle"
  model_group_alias:
    strategic: ["claude-opus-4-5", "claude-sonnet-4-6"]
    complex: ["o3-mini"]
    medium: ["grok-code-fast-1", "gpt-5"]
    simple: ["llama-3.3-70b", "gemini-flash"]
    confidential: ["nemotron-3-nano"]
