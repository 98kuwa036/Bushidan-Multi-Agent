# =============================================================
# 武士団マルチエージェントシステム v10 - Configuration
# =============================================================
# "5層ハイブリッドアーキテクチャ + 軍師(Gunshi) + BDI Framework"
# =============================================================

system:
  name: "Bushidan Multi-Agent System"
  version: "10.0"
  language: "ja"
  philosophy: "シンプル・イズ・ベスト + 実用性第一 + 汎用性の追求"
  subtitle: "5-Tier Hybrid Architecture with Gunshi + BDI Framework + llama.cpp"

# --- BDI Framework Configuration (v9.4) ---
bdi_framework:
  enabled: true
  description: "Belief-Desire-Intention framework for formal multi-agent theory"
  default_mode: true  # v9.4: BDI enabled by default

  features:
    - "Formal semantics: Perceive → Deliberate → Plan → Execute → Reconsider"
    - "Belief management with consistency checking"
    - "Goal-directed deliberation with priority-based selection"
    - "Explicit plan generation and tracking"
    - "Japanese logging throughout"
    - "Backward compatible with existing agents"

  shogun_bdi:
    enabled: true
    strategic_desires:
      maintain_quality:
        type: "maintenance"
        priority: 0.9
        description: "Maintain high quality standards (95+ points)"
      optimize_cost:
        type: "optimization"
        priority: 0.7
        description: "Optimize cost while maintaining quality"
      ensure_security:
        type: "constraint"
        priority: 0.95
        description: "Ensure security for sensitive operations"
      learn_and_improve:
        type: "exploration"
        priority: 0.6
        description: "Learn from past decisions"
        requires: ["memory_mcp"]

  gunshi_bdi:
    enabled: true
    strategic_planning_desires:
      accurate_planning:
        type: "achievement"
        priority: 0.95
        description: "Generate accurate, actionable strategy plans"
      code_quality:
        type: "maintenance"
        priority: 0.9
        description: "Ensure code quality through architectural review"
      efficient_decomposition:
        type: "optimization"
        priority: 0.85
        description: "Decompose complex tasks into implementable units"
      risk_mitigation:
        type: "maintenance"
        priority: 0.8
        description: "Identify and mitigate technical risks"

  karo_bdi:
    enabled: true
    tactical_desires:
      efficient_decomposition:
        type: "optimization"
        priority: 0.9
        description: "Decompose tasks efficiently"
      maximize_parallelization:
        type: "optimization"
        priority: 0.8
        description: "Maximize parallel execution"
      maintain_coordination_quality:
        type: "maintenance"
        priority: 0.85
        description: "High quality result integration"

  taisho_bdi:
    enabled: true
    implementation_desires:
      correct_implementation:
        type: "achievement"
        priority: 1.0
        description: "Generate correct, working code"
      efficient_execution:
        type: "optimization"
        priority: 0.7
        description: "Minimize resource usage"
      quality_validation:
        type: "achievement"
        priority: 0.85
        description: "Validate code quality"
      self_healing_recovery:
        type: "maintenance"
        priority: 0.8
        description: "Automatically fix errors"

# --- v10 革新的機能 ---
v10_innovations:
  gunshi_pdca:
    enabled: true
    description: "軍師 PDCA Engine - Plan→Do→Check→Act cycle"
    model: "qwen3-coder-next"
    engine: "PDCA"

    pdca_cycle:
      plan:
        description: "256Kコンテキストでタスク分析 → サブタスク分解"
        temperature: 0.3
        max_subtasks: 5
        subtask_token_limit: 3000  # Taisho の 4096 に収める

      do:
        description: "サブタスクを Kimi K2.5 / Taisho に委譲 (真の並列実行)"
        execution_strategy: "independent=Kimi並列, dependent=sequential"
        primary_executor: "Kimi K2.5 (128K, 並列API) → Taisho (4層フォールバック)"
        fallback_executor: "Gunshi API (Taisho未初期化時のみ)"

      check:
        description: "全結果を 256K window で一括検証 + 検校ビジュアル検証"
        temperature: 0.1  # 厳密判定
        key_value: "テキスト検証(Gunshi 256K) + ビジュアル検証(検校) = 完全品質保証"
        verification_criteria:
          - "元タスクの要件充足"
          - "サブタスク間整合性 (import, 型, インターフェース)"
          - "コード品質 (バグ, セキュリティ)"
          - "実装の完全性"
          - "UI/ビジュアル検証 (検校: Kimi Vision + Playwright)"

      act:
        description: "不合格サブタスクに修正指示 → 再実装"
        temperature: 0.2  # 精密な修正
        max_correction_loops: 1  # 無限ループ防止

    capabilities:
      - "256K context (cross-file verification)"
      - "SWE-Bench 70.6% (Check精度)"
      - "Non-thinking mode (低レイテンシ)"
      - "80B/3B active (コスト効率)"

    api_providers:
      - "DashScope (Alibaba Cloud)"
      - "OpenRouter"

  llamacpp_cpu:
    enabled: true
    description: "llama.cpp CPU最適化（HP ProDesk 600対応、Ollama不要）"
    benefits:
      - "AVX2, FMA, F16C CPU命令活用"
      - "メモリロック（mlock）でスワップ防止"
      - "ネイティブC++（Goオーバーヘッド無し）"
      - "HP ProDesk 600完全対応"
    expected_speed: "10-18 tok/s (i5-8500 CPU)"

  intelligent_routing:
    enabled: true
    description: "運用黄金律 v10 に基づくインテリジェント・ルーティング"
    golden_rules:
      - "Simple → Groq (instant, free, DON'T wake Qwen)"
      - "Medium → Local Qwen3 llama.cpp (local volume, ¥0)"
      - "Complex → Gunshi (Qwen3-Coder-Next API, 作戦立案)"
      - "Strategic → Shogun (final authority)"
    complexity_judgment:
      simple: "Questions, lookups (<50 chars, no code) → Groq"
      medium: "Standard implementation (code keywords) → Local Qwen3"
      complex: "Multi-component (multiple files) → Gunshi → Local → Cloud → Gemini"
      strategic: "Design decisions (strategic keywords) → Shogun"

  fallback_chains:
    enabled: true
    description: "多段フォールバック・チェーン（99.5%信頼性）"
    chains:
      simple:
        primary: "Groq (300-500 tok/s, free)"
        fallback: "Gemini 3 Flash"
      medium:
        primary: "Local Qwen3 llama.cpp (4096 context, ¥0)"
        shadow: "Cloud Qwen3-plus (32k context, ¥3)"
        final_defense: "Gemini 3 Flash (¥0.04)"
      complex:
        primary: "Gunshi PDCA: Plan(256K) → Do(Kimi並列+Taisho) → Check(256K) → Act"
        do_chain: "Kimi K2.5 (128K, 並列) → Local Qwen3 → Kagemusha → Gemini 3"
        do_parallel: "Kimi K2.5 の asyncio.gather で真の並列サブタスク実行"
        gunshi_unavailable: "Kimi → Local Qwen3 → Cloud Qwen3 → Gemini 3 (4層)"

  prompt_caching:
    enabled: true
    description: "Claude Prompt Caching（90%コスト削減）"
    technology: "Anthropic Prompt Caching API"

  power_optimization:
    enabled: true
    description: "電力最適化（Qwen起動制御）"
    strategy: "Simple タスクは Groq で処理し Qwen を起こさない"

# --- リポジトリ同期 ---
repo:
  local_base: "/home/claude"
  github_remote: ""  # git remote から自動取得
  sync_interval_min: 5

# --- 将軍 (Shogun) - Strategic Layer ---
shogun:
  codename: "Shogun"
  role: "将軍 - 大局的設計図・難解エラー最終判断・品質保証"
  model: "claude-sonnet-4-5-20250929"
  opus_model: "claude-opus-4-20250514"

  prompt_caching:
    enabled: true
    cache_ttl_minutes: 5
    system_prompt_caching: true

  pro_cli:
    enabled: true
    monthly_limit: 2000
    model: "sonnet"

  review_system:
    enabled: true
    levels:
      basic:
        target: ["simple", "medium"]
        model: "sonnet"
        cost_yen: 0
      detailed:
        target: ["complex"]
        model: "sonnet"
        cost_yen: "0-5"
      premium:
        target: ["strategic"]
        model: "opus-4"
        cost_yen: 10

  opus_triggers:
    - "task_complexity == STRATEGIC"
    - "risk_level in [HIGH, CRITICAL]"
    - "security_vulnerabilities detected"
    - "security keywords: auth, payment, database"
    - "user_request == true"

# --- 軍師 (Gunshi) - Strategy Planning Layer (v10) ---
gunshi:
  codename: "Gunshi"
  role: "軍師 - 作戦立案・コードアーキテクチャ監査・複雑タスク分解"
  model: "qwen3-coder-next"
  total_params: "80B"
  active_params: "3B"
  context_window: 262144  # 256K
  swe_bench: "70.6%"

  api:
    primary_provider: "openrouter"
    providers:
      openrouter:
        base_url: "https://openrouter.ai/api/v1"
        model_name: "qwen/qwen3-coder-next"
      dashscope:
        base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
        model_name: "qwen3-coder-next"
    temperature: 0.3  # 低め = 正確な戦略立案
    max_tokens: 8192  # 長めの分析を許容

  pdca_engine:
    max_subtasks: 5
    max_correction_loops: 1
    subtask_token_limit: 3000
    temperature_plan: 0.3
    temperature_check: 0.1
    temperature_act: 0.2

  activation_triggers:
    - "task_complexity == COMPLEX"
    - "code_review_requested"
    - "multi_file_changes"
    - "architecture_related"

# --- 傭兵 (Yohei) - Kimi K2.5 Mercenary (v10.1) ---
yohei:
  codename: "Kimi K2.5"
  role: "傭兵 - 並列サブタスク実行・大規模コンテキスト処理・ビジュアル検証"
  model: "kimi-k2-0711"
  context_window: 131072  # 128K
  multimodal: true

  api:
    primary_provider: "moonshot"
    providers:
      moonshot:
        base_url: "https://api.moonshot.cn/v1"
        model_name: "kimi-k2-0711"
      openrouter:
        base_url: "https://openrouter.ai/api/v1"
        model_name: "moonshot/kimi-k2.5"
    default_max_tokens: 8192
    timeout_seconds: 120

  strengths:
    - "128K context: 軍師(256K)と大将(4K)のギャップを埋める"
    - "クラウドAPI: asyncio.gather で真の並列サブタスク実行"
    - "マルチモーダル: 検校(Kengyo)と連携したUI視覚検証"
    - "高速推論: ローカル llama.cpp より低レイテンシ"

  role_in_pdca:
    do_phase: "独立サブタスクを implement_subtasks_parallel() で並列実行"
    check_phase: "検校(Kengyo): Playwright スクリーンショット + Kimi Vision 検証"
    confidential: "秘匿タスクはスキップ → Local Qwen3 が直接処理"

  cost:
    input_per_1k_tokens_yen: 0.002
    output_per_1k_tokens_yen: 0.008
    estimated_monthly_yen: 30  # ~100 Complex tasks/month

# --- 検校 (Kengyo) - Visual Debugger (v10.1) ---
kengyo:
  codename: "Kengyo"
  role: "検校 - ビジュアル・デバッガー (Kimi K2.5 Vision + Playwright MCP)"
  description: "PDCA Check フェーズのビジュアル検証拡張"

  capabilities:
    - "スクリーンショット取得: Playwright MCP (Desktop + Mobile)"
    - "ビジュアル解析: Kimi K2.5 Vision (レイアウト・表示・アクセシビリティ)"
    - "リグレッション検出: Before/After 比較"
    - "マルチビューポート: Desktop (1280px) / Tablet (768px) / Mobile (375px)"

  check_criteria:
    - "レイアウト崩れ (重なり、はみ出し、不正な空白)"
    - "テキスト可読性 (フォントサイズ、コントラスト)"
    - "ボタン・リンクの視認性"
    - "画像・アイコン表示状態"
    - "レスポンシブ対応"
    - "色使いの一貫性とアクセシビリティ"

  integration:
    pdca_phase: "Check (Phase 3)"
    text_weight: 0.8   # テキスト検証 80%
    visual_weight: 0.2  # ビジュアル検証 20%
    activation: "タスクコンテキストに URL or UI キーワードが含まれる場合のみ"
    graceful_degradation: "Kimi/Playwright 未設定時はスキップ (テキスト検証のみ)"

  dependencies:
    required: "Kimi K2.5 (Vision)"
    optional: "Playwright MCP (Smithery)"

# --- 家老 (Karo) - Tactical Layer ---
karo:
  codename: "Karo"
  role: "家老 - タスク分解・最終防御線"

  dynamic_selection:
    enabled: true
    groq:
      model: "llama-3.3-70b-versatile"
      use_case: "Simple tasks (instant speed)"
      speed: "300-500 tok/s"
      cost_yen: 0

    gemini3:
      model: "gemini-3.0-flash"
      use_case: "Final defense line (fallback)"
      cost_yen: 0.04

# --- 大将 (Taisho) - Implementation Layer ---
taisho:
  codename: "Taisho"
  role: "大将 - 実務実装・MCP駆使"

  # v9.4: llama.cpp (replaces Ollama)
  local:
    backend: "llama.cpp"
    model: "Qwen3-Coder-30B-Q4_K_M.gguf"
    endpoint: "http://127.0.0.1:8080"
    context_length: 4096
    quantization: "Q4_K_M"
    threads: 6  # HP ProDesk 600: i5-8500 6 cores
    batch_size: 512
    mlock: true
    expected_speed: "15-25 tok/s (CPU)"
    cost_yen: 0
    power_cost_yen: 3  # CPU is more efficient
    optimizations:
      - "llama.cpp CPU native (AVX2, FMA)"
      - "Memory lock (mlock) prevents swap"
      - "No Ollama overhead"
      - "HP ProDesk 600 optimized"

  # Shadow: Cloud Qwen3-plus (Kagemusha)
  kagemusha:
    enabled: true
    model: "qwen3-coder-plus"
    provider: "Alibaba Cloud Model Studio"
    context_length: 32000
    activation_triggers:
      - "Local Qwen3 fails"
      - "Context > 4096 tokens"
      - "Complex task requiring more capacity"
    cost_yen: 3
    description: "影武者（Shadow backup）for seamless continuation"

  # Final fallback: Gemini 3 Flash
  final_defense:
    model: "gemini-3.0-flash"
    activation: "When Kimi, Local Qwen3, and Cloud Qwen3 all fail"
    cost_yen: 0.04

  # v10.1: 4層フォールバックチェーン
  fallback_chain_v10_1:
    tier_1: "Kimi K2.5 傭兵 (128K ctx, 並列実行) - 非秘匿タスク"
    tier_2: "ローカルQwen3 (4K ctx, ¥0) - 秘匿処理・統合・オフライン"
    tier_3: "クラウドQwen3+ 影武者 (32K ctx, ¥3) - 容量拡張"
    tier_4: "Gemini 3 Flash (防衛, ¥0.04) - 最終防衛"

# --- 足軽 (Ashigaru) - Execution Layer ---
ashigaru:
  codename: "Ashigaru"
  role: "足軽 - MCP実行・並列処理"

  # v10.1: Smithery MCP 経由
  mcp_manager: "smithery"
  members:
    # AI
    - name: "sequential_thinking"
      type: "MCP (Smithery)"
      role: "動的思考チェーン: 分岐・修正可能な推論"

    # Browser
    - name: "playwright"
      type: "MCP (Smithery)"
      role: "ブラウザ操作・スクリーンショット・検校(Kengyo)ビジュアル検証"

    # Search
    - name: "tavily"
      type: "MCP (Smithery)"
      role: "Web検索 (1,000/月 free)"

    - name: "exa"
      type: "MCP (Smithery)"
      role: "セマンティック検索"
      optional: true

    # Data
    - name: "filesystem"
      type: "MCP (Smithery)"
      role: "ファイル読み書き"

    - name: "graph_memory"
      type: "MCP (Smithery)"
      role: "グラフ型記憶 (エンティティ関係)"
      optional: true

    - name: "prisma"
      type: "MCP (Smithery)"
      role: "DB操作 (Prisma経由)"
      optional: true

    # Integration
    - name: "slack"
      type: "MCP (Smithery)"
      role: "Slack連携"
      optional: true

    - name: "notion"
      type: "MCP (Smithery)"
      role: "Notion連携"
      optional: true

    - name: "git"
      type: "MCP (Smithery)"
      role: "Git操作"

    # API (non-MCP)
    - name: "groq"
      type: "API"
      role: "瞬速実行（Simple tasks）"
      model: "llama-3.3-70b-versatile"

# --- インフラ設定 ---
infrastructure:
  mode: "hybrid"
  description: "クラウドの知能・速度 + ローカルの物量・コスト0"

  local:
    hardware: "HP ProDesk 600"
    cpu: "Intel Core i5-8500 (6C/6T)"
    ram: "16-32GB DDR4"
    gpu: "なし（CPU推論）"
    os: "Ubuntu 22.04/24.04 LTS"

  # v9.4: llama.cpp (replaces Ollama)
  llamacpp:
    endpoint: "http://127.0.0.1:8080"
    model_path: "models/qwen3/Qwen3-Coder-30B-Q4_K_M.gguf"
    threads: 6  # i5-8500: 6 cores
    context_size: 4096
    batch_size: 512
    mlock: true
    mmap: true

  # Legacy (unused in v9.4)
  # ollama:
  #   endpoint: "http://localhost:11434"

  litellm:
    endpoint: "http://localhost:8000"
    features:
      - "Context compression (<4k)"
      - "Multi-API integration"

# --- Proxmox コンテナ設定 ---
proxmox:
  containers:
    ct_100:
      name: "本陣"
      role: "System orchestration"
      disk: "10GB"
      ram: "2GB"
      cpu: 2
      description: "調整専用、モデル無し"

    ct_101:
      name: "Qwen3"
      role: "Local LLM inference"
      disk: "45GB"
      ram: "24GB"
      cpu: 8
      description: "llama.cpp + Qwen3-Coder-30B (~17GB model)"
      storage_breakdown:
        model: "17GB"
        llamacpp: "3GB"
        dependencies: "5GB"
        os_overhead: "10GB"
        free_space: "10GB"

# --- パフォーマンス目標 (PDCA実測ベース) ---
performance_targets:
  v10_pdca:
    simple:
      time_seconds: 2
      route: "Groq"
      cost_yen: 0

    medium:
      time_seconds: "12-15"  # CPU推論 (HP ProDesk 600)
      route: "Local Qwen3 llama.cpp"
      cost_yen: 0

    complex:
      time_seconds_no_correction: "21-30"  # Plan(3-5) + Do(15-20) + Check(3-5)
      time_seconds_with_correction: "36-55"  # + Act(15-20) + ReCheck(3-5)
      route: "Gunshi PDCA: Plan→Do(Kimi並列+Taisho)→Check→Act"
      cost_yen: "0.04-0.10"  # Gunshi API (Plan+Check+maybe Act)

    strategic:
      time_seconds: 45
      route: "Shogun"
      cost_yen: "0-5"

# --- コスト目標 ---
cost_targets:
  v10_1:
    monthly_yen: 3540
    breakdown:
      claude_pro: 3000
      claude_api: 140
      opus_premium: 100
      gemini_3_flash: 120
      alibaba_cloud: 60
      qwen3_coder_next: 10  # Gunshi PDCA (3B active, ~¥0.05/request × 200/month)
      kimi_k2: 30  # 傭兵 (¥0.01/request × ~100 Complex tasks × 3 subtasks)
      groq: 0
      electricity: 80

# --- 品質目標 (厳密ベンチマーク基準) ---
quality_targets:
  v10_pdca:
    note: "v9.4比較: COMPLEX のみ改善 (+7-8pt), 他は不変"
    simple: "85-90"       # Groq (変化なし)
    medium: "88-92"       # Local Qwen3 (変化なし)
    complex_no_correction: "82-90"   # PDCA Plan+Do+Check (v9.4: 78-85)
    complex_with_correction: "87-93" # PDCA full cycle (Act修正後)
    strategic: "95-98"    # Opus Premium (変化なし)
    overall: "88-92"      # 加重平均

    pdca_improvement_analysis:
      plan_value: "Taisho 4096制限を Gunshi 256K で補完 → 焦点を絞った実装指示"
      check_value: "cross-file 整合性検証 → Taisho が見えないバグを検出"
      act_value: "具体的修正指示 → 盲目的リトライより高い修正成功率"
      kimi_value: "128K context + 並列実行 → Taisho 4096制限のボトルネック解消"
      remaining_bottleneck: "Kimi API レート制限 (max_concurrency=4)"

# --- 開発環境 ---
development:
  primary_interface: "Slack"
  modes:
    battalion: "Full system (Shogun + Gunshi + Karo + Taisho + Ashigaru)"
    company: "Slack mode (Karo + Taisho + Ashigaru)"
    platoon: "HA OS mode (Taisho + Dynamic Ashigaru)"

  logging:
    level: "INFO"
    format: "structured"
    language: "ja"  # v9.4: Japanese logging

# --- セキュリティ ---
security:
  secrets_detection: true
  code_validation: true
  security_keywords_monitoring:
    - "auth"
    - "authentication"
    - "payment"
    - "database"
    - "credential"

  opus_review_on_security: true

# --- 記憶システム (3層) ---
memory_system:
  short_term:
    location: "Slack Thread"
    duration: "数日"

  medium_term:
    location: "Memory MCP (bushidan_memory.jsonl)"
    duration: "数週間〜数ヶ月"

  long_term:
    location: "Notion Database"
    duration: "永続"

# --- MCP権限マトリクス (v10.1) ---
mcp_permissions:
  config_file: "config/mcp_permissions.yaml"
  description: "役職別MCP使用権限・優先度設定"
  enabled: true

  access_levels:
    exclusive: "専属 - この役職のみ直接使用可能"
    primary: "優先 - 他役職も使用可能だが優先される"
    secondary: "補助 - 必要に応じて使用可能"
