# =============================================================
# 武士団マルチエージェントシステム v11.4 - Configuration
# =============================================================
# "脱中国企業・9層ハイブリッドアーキテクチャ + PDCA + BDI"
# =============================================================

system:
  name: "Bushidan Multi-Agent System"
  version: "11.4"
  language: "ja"
  philosophy: "脱中国企業・シンプル・イズ・ベスト + 実用性第一 + 汎用性の追求"
  subtitle: "9-Tier Hybrid Architecture with o3-mini PDCA + BDI Framework + Nemotron Local"

# --- BDI Framework Configuration ---
bdi_framework:
  enabled: true
  description: "Belief-Desire-Intention framework for formal multi-agent theory"
  default_mode: true

  features:
    - "Formal semantics: Perceive → Deliberate → Plan → Execute → Reconsider"
    - "Belief management with consistency checking"
    - "Goal-directed deliberation with priority-based selection"
    - "Explicit plan generation and tracking"
    - "Japanese logging throughout"
    - "Backward compatible with existing agents"

  daigensui_bdi:
    enabled: true
    strategic_desires:
      maintain_quality:
        type: "maintenance"
        priority: 0.95
        description: "Maintain highest quality standards (97+ points)"
      optimize_cost:
        type: "optimization"
        priority: 0.7
        description: "Optimize cost while maintaining quality"
      ensure_security:
        type: "constraint"
        priority: 0.98
        description: "Ensure security for all operations"
      learn_and_improve:
        type: "exploration"
        priority: 0.6
        description: "Learn from past decisions"
        requires: ["memory_mcp"]

  shogun_bdi:
    enabled: true
    coding_desires:
      high_quality_code:
        type: "achievement"
        priority: 0.95
        description: "Generate high-quality, production-ready code"
      efficient_implementation:
        type: "optimization"
        priority: 0.85
        description: "Implement efficiently with minimal overhead"
      code_security:
        type: "constraint"
        priority: 0.9
        description: "Ensure code security best practices"

  gunshi_bdi:
    enabled: true
    strategic_planning_desires:
      accurate_planning:
        type: "achievement"
        priority: 0.95
        description: "Generate accurate, actionable strategy plans"
      code_quality:
        type: "maintenance"
        priority: 0.9
        description: "Ensure code quality through architectural review"
      efficient_decomposition:
        type: "optimization"
        priority: 0.85
        description: "Decompose complex tasks into implementable units"
      risk_mitigation:
        type: "maintenance"
        priority: 0.8
        description: "Identify and mitigate technical risks"

  karo_bdi:
    enabled: true
    tactical_desires:
      efficient_decomposition:
        type: "optimization"
        priority: 0.9
        description: "Decompose tasks efficiently"
      maximize_parallelization:
        type: "optimization"
        priority: 0.8
        description: "Maximize parallel execution"
      maintain_coordination_quality:
        type: "maintenance"
        priority: 0.85
        description: "High quality result integration"

  sanbo_bdi:
    enabled: true
    implementation_desires:
      correct_implementation:
        type: "achievement"
        priority: 1.0
        description: "Generate correct, working code"
      efficient_execution:
        type: "optimization"
        priority: 0.7
        description: "Minimize resource usage"
      quality_validation:
        type: "achievement"
        priority: 0.85
        description: "Validate code quality"
      self_healing_recovery:
        type: "maintenance"
        priority: 0.8
        description: "Automatically fix errors"

# --- v11.4 革新的機能 ---
v11_4_innovations:
  de_china:
    enabled: true
    description: "脱中国企業 - 中国企業のサービスを全て排除"
    removed_services:
      - "Alibaba Cloud / DashScope"
      - "Moonshot / Kimi K2.5"
      - "Qwen series (all)"
    replaced_with:
      - "OpenAI (o3-mini, GPT-5)"
      - "xAI (Grok-code-fast-1)"
      - "NVIDIA (Nemotron-3-Nano local)"
      - "Google (Gemini Flash)"
      - "Anthropic (Claude Opus 4.5, Sonnet 4.6)"
      - "Meta (Llama 3.3 70B via Groq)"

  gunshi_pdca:
    enabled: true
    description: "軍師 PDCA Engine - o3-mini (high) による Plan→Do→Check→Act"
    model: "o3-mini"
    reasoning_effort: "high"
    engine: "PDCA"

    pdca_cycle:
      plan:
        description: "o3-mini高推論力でタスク分析 → サブタスク分解"
        reasoning_effort: "high"
        max_subtasks: 5
        subtask_token_limit: 4000

      do:
        description: "サブタスクを参謀A/B (GPT-5 / Grok) に委譲"
        execution_strategy: "independent=参謀B並列, dependent=sequential"
        primary_executor: "GPT-5 (参謀-A) → Grok-code-fast-1 (参謀-B)"
        fallback_executor: "家老-A (Gemini Flash)"

      check:
        description: "o3-mini で全結果を一括検証 + 検校ビジュアル検証"
        reasoning_effort: "high"
        key_value: "テキスト検証(軍師 o3-mini) + ビジュアル検証(検校 Gemini Vision) = 完全品質保証"
        verification_criteria:
          - "元タスクの要件充足"
          - "サブタスク間整合性 (import, 型, インターフェース)"
          - "コード品質 (バグ, セキュリティ)"
          - "実装の完全性"
          - "UI/ビジュアル検証 (検校: Gemini Flash Vision + Playwright)"

      act:
        description: "不合格サブタスクに修正指示 → 再実装"
        reasoning_effort: "high"
        max_correction_loops: 1

    capabilities:
      - "o3-mini (high): 推論特化・SWE-Bench高精度"
      - "Non-China API: 信頼性の高い西側プロバイダー"
      - "GPT-5 + Grok 並列実装: 高速・高品質"

    api_providers:
      - "OpenAI (o3-mini, GPT-5)"
      - "xAI (Grok)"

  nemotron_local:
    enabled: true
    description: "Nemotron-3-Nano ローカル推論（HP ProDesk 600専用化）"
    benefits:
      - "NVIDIA製・脱中国: 信頼性の高いローカルLLM"
      - "小型高効率: 8GB RAMで動作可能"
      - "機密情報処理: API送信不要"
      - "超長文対応: ローカルでコンテキスト制限なし"
      - "llama.cpp CPU最適化"
    expected_speed: "15-25 tok/s (CPU)"

  intelligent_routing:
    enabled: true
    description: "運用黄金律 v11.4 に基づくインテリジェント・ルーティング"
    golden_rules:
      - "Simple → 家老-B Groq Llama3.3 (instant, free)"
      - "Medium → 参謀-B Grok (fast implementation)"
      - "Complex → 軍師 o3-mini PDCA (reasoning + 参謀で実装)"
      - "Strategic → 大元帥 Claude Opus 4.5 (最高権限)"
      - "Coding → 将軍 Claude Sonnet 4.6 (高難度コーディング)"
      - "Confidential → 隠密 Nemotron-3-Nano (ローカル処理)"
      - "Visual → 検校 Gemini Flash Vision (マルチモーダル)"
    complexity_judgment:
      simple: "Questions, lookups (<50 chars, no code) → 家老-B Groq"
      medium: "Standard implementation → 参謀-B Grok or 参謀-A GPT-5"
      complex: "Multi-component → 軍師 o3-mini PDCA"
      strategic: "Design decisions → 大元帥 Opus 4.5"
      coding: "High difficulty coding → 将軍 Sonnet 4.6"
      confidential: "Sensitive data → 隠密 Nemotron Local"

  fallback_chains:
    enabled: true
    description: "多段フォールバック・チェーン（99.5%信頼性）"
    chains:
      simple:
        primary: "家老-B Groq Llama 3.3 70B (free, 300-500 tok/s)"
        fallback: "家老-A Gemini Flash"
      medium:
        primary: "参謀-B Grok-code-fast-1 (高速実装)"
        secondary: "参謀-A GPT-5 (汎用)"
        final_defense: "家老-A Gemini Flash"
      complex:
        primary: "軍師 o3-mini PDCA: Plan→Do(参謀並列)→Check→Act"
        do_chain: "参謀-A GPT-5 → 参謀-B Grok → 家老-A Gemini Flash"
        gunshi_unavailable: "参謀-A GPT-5 → 参謀-B Grok → 家老-A Gemini Flash"
      strategic:
        primary: "大元帥 Claude Opus 4.5"
        fallback: "将軍 Claude Sonnet 4.6"

  prompt_caching:
    enabled: true
    description: "Claude Prompt Caching（90%コスト削減）"
    technology: "Anthropic Prompt Caching API"

  power_optimization:
    enabled: true
    description: "電力最適化"
    strategy: "Simple タスクは Groq で処理しローカルLLMを起こさない"

# --- リポジトリ同期 ---
repo:
  local_base: "/home/claude"
  github_remote: ""
  sync_interval_min: 5

# --- 大元帥 (Daigensui) - Supreme Strategic Layer ---
daigensui:
  codename: "Daigensui"
  role: "大元帥 - 最高難度・戦略設計・最終品質保証"
  model: "claude-opus-4-5-20250514"

  prompt_caching:
    enabled: true
    cache_ttl_minutes: 5
    system_prompt_caching: true

  activation_triggers:
    - "task_complexity == STRATEGIC"
    - "risk_level in [HIGH, CRITICAL]"
    - "security_vulnerabilities detected"
    - "security keywords: auth, payment, database"
    - "user_request == true"
    - "architecture_decision"

# --- 将軍 (Shogun) - High-Difficulty Coding Layer ---
shogun:
  codename: "Shogun"
  role: "将軍 - 高難度コーディング・設計実装"
  model: "claude-sonnet-4-6"

  prompt_caching:
    enabled: true
    cache_ttl_minutes: 5
    system_prompt_caching: true

  pro_cli:
    enabled: true
    monthly_limit: 2000
    model: "sonnet"

  review_system:
    enabled: true
    levels:
      basic:
        target: ["simple", "medium"]
        model: "sonnet"
        cost_yen: 0
      detailed:
        target: ["complex"]
        model: "sonnet"
        cost_yen: "0-5"
      premium:
        target: ["strategic"]
        model: "opus-4.5"
        cost_yen: 10

# --- 軍師 (Gunshi) - Reasoning & PDCA Layer ---
gunshi:
  codename: "Gunshi"
  role: "軍師 - 推論・設計・PDCA作戦立案"
  model: "o3-mini"
  reasoning_effort: "high"
  provider: "openai"

  api:
    primary_provider: "openai"
    providers:
      openai:
        base_url: "https://api.openai.com/v1"
        model_name: "o3-mini"
    reasoning_effort: "high"
    max_tokens: 8192

  pdca_engine:
    max_subtasks: 5
    max_correction_loops: 1
    subtask_token_limit: 4000
    reasoning_effort_plan: "high"
    reasoning_effort_check: "high"
    reasoning_effort_act: "high"

  activation_triggers:
    - "task_complexity == COMPLEX"
    - "code_review_requested"
    - "multi_file_changes"
    - "architecture_related"

# --- 参謀-A (Sanbo-A) - General Coding ---
sanbo_a:
  codename: "Sanbo-A"
  role: "参謀-A - 汎用コーディング"
  model: "gpt-5"
  provider: "openai"

  api:
    primary_provider: "openai"
    providers:
      openai:
        base_url: "https://api.openai.com/v1"
        model_name: "gpt-5"
    temperature: 0.3
    max_tokens: 8192

  strengths:
    - "最新世代GPT: 高品質コード生成"
    - "汎用性: あらゆるプログラミング言語対応"
    - "大規模コンテキスト: 長いコード解析"

# --- 参謀-B (Sanbo-B) - Fast Implementation ---
sanbo_b:
  codename: "Sanbo-B"
  role: "参謀-B - 実装・バグ修正・高速"
  model: "grok-code-fast-1"
  provider: "xai"

  api:
    primary_provider: "xai"
    providers:
      xai:
        base_url: "https://api.x.ai/v1"
        model_name: "grok-code-fast-1"
    temperature: 0.2
    max_tokens: 8192

  strengths:
    - "高速推論: コーディング特化"
    - "バグ修正: 迅速な問題解決"
    - "実装速度: Grok系最速"

# --- 家老-A (Karo-A) - Lightweight Tasks ---
karo_a:
  codename: "Karo-A"
  role: "家老-A - 軽量タスク・最終防衛線"
  model: "gemini-2.5-flash"
  provider: "google"

  api:
    primary_provider: "google"
    providers:
      google:
        model_name: "gemini-2.5-flash"
    temperature: 0.3
    max_tokens: 2000

# --- 家老-B (Karo-B) - Algorithm Specialist ---
karo_b:
  codename: "Karo-B"
  role: "家老-B - アルゴリズム特化・瞬速応答"
  model: "llama-3.3-70b-versatile"
  provider: "groq"

  api:
    primary_provider: "groq"
    providers:
      groq:
        base_url: "https://api.groq.com/openai/v1"
        model_name: "llama-3.3-70b-versatile"
    temperature: 0.2
    max_tokens: 2000
    speed: "300-500 tok/s"
    cost_yen: 0

# --- 検校 (Kengyo) - Multimodal Visual Debugger ---
kengyo:
  codename: "Kengyo"
  role: "検校 - マルチモーダル・ビジュアルデバッガー"
  model: "gemini-2.5-flash"
  description: "Gemini Flash Vision でビジュアル検証"

  capabilities:
    - "スクリーンショット取得: Playwright MCP (Desktop + Mobile)"
    - "ビジュアル解析: Gemini Flash Vision (レイアウト・表示・アクセシビリティ)"
    - "リグレッション検出: Before/After 比較"
    - "マルチビューポート: Desktop (1280px) / Tablet (768px) / Mobile (375px)"

  check_criteria:
    - "レイアウト崩れ (重なり、はみ出し、不正な空白)"
    - "テキスト可読性 (フォントサイズ、コントラスト)"
    - "ボタン・リンクの視認性"
    - "画像・アイコン表示状態"
    - "レスポンシブ対応"
    - "色使いの一貫性とアクセシビリティ"

  integration:
    pdca_phase: "Check (Phase 3)"
    text_weight: 0.8
    visual_weight: 0.2
    activation: "タスクコンテキストに URL or UI キーワードが含まれる場合のみ"
    graceful_degradation: "Playwright 未設定時はスキップ (テキスト検証のみ)"

  dependencies:
    required: "Gemini Flash Vision"
    optional: "Playwright MCP (Smithery)"

# --- 隠密 (Onmitsu) - Local Confidential Processing ---
onmitsu:
  codename: "Onmitsu"
  role: "隠密 - 機密・超長文・ローカル処理"
  model: "nemotron-3-nano"
  provider: "local_llamacpp"

  local:
    backend: "llama.cpp"
    model: "Nemotron-3-Nano.gguf"
    endpoint: "http://192.168.11.232:8080"
    context_length: 8192
    quantization: "Q4_K_M"
    threads: 6
    batch_size: 512
    mlock: true
    expected_speed: "15-25 tok/s (CPU)"
    cost_yen: 0
    power_cost_yen: 3

  strengths:
    - "NVIDIA製: 脱中国・信頼性の高いモデル"
    - "ローカル完結: API送信不要・機密情報安全"
    - "超長文対応: コンテキスト制限緩和"
    - "CPU最適化: llama.cpp + AVX2, FMA"
    - "¥0運用: 電気代のみ"

  activation_triggers:
    - "confidential_data"
    - "sensitive_code"
    - "offline_required"
    - "long_context_local"

# --- 足軽 (Ashigaru) - Execution Layer ---
ashigaru:
  codename: "Ashigaru"
  role: "足軽 - MCP実行・並列処理"

  mcp_manager: "smithery"
  members:
    - name: "sequential_thinking"
      type: "MCP (Smithery)"
      role: "動的思考チェーン: 分岐・修正可能な推論"

    - name: "playwright"
      type: "MCP (Smithery)"
      role: "ブラウザ操作・スクリーンショット・検校ビジュアル検証"

    - name: "tavily"
      type: "MCP (Smithery)"
      role: "Web検索 (1,000/月 free)"

    - name: "exa"
      type: "MCP (Smithery)"
      role: "セマンティック検索"
      optional: true

    - name: "filesystem"
      type: "MCP (Smithery)"
      role: "ファイル読み書き"

    - name: "graph_memory"
      type: "MCP (Smithery)"
      role: "グラフ型記憶 (エンティティ関係)"
      optional: true

    - name: "prisma"
      type: "MCP (Smithery)"
      role: "DB操作 (Prisma経由)"
      optional: true

    - name: "discord"
      type: "API (discord.py)"
      role: "Discord連携"
      optional: true

    - name: "notion"
      type: "MCP (Smithery)"
      role: "Notion連携"
      optional: true

    - name: "git"
      type: "MCP (Smithery)"
      role: "Git操作"

    - name: "groq"
      type: "API"
      role: "瞬速実行（Simple tasks）"
      model: "llama-3.3-70b-versatile"

# --- インフラ設定 ---
infrastructure:
  mode: "hybrid"
  description: "脱中国・クラウドの知能＋ローカルの機密処理"

  machines:
    proDesk_600:
      role: "ローカルLLM専用機"
      hardware: "HP ProDesk 600"
      cpu: "Intel Core i5-8500 (6C/6T)"
      ram: "24GB DDR4 (16GB + 8GB増強)"
      gpu: "なし（CPU推論）"
      os: "Ubuntu 22.04/24.04 LTS"
      dedicated_to: "Nemotron-3-Nano (隠密)"

    eliteDesk:
      role: "メインオーケストレーション"
      hardware: "HP EliteDesk"
      cpu: "Intel Core i5-8500 (6C/6T)"
      ram: "16GB DDR4"
      gpu: "なし"
      os: "Ubuntu 22.04/24.04 LTS"
      dedicated_to: "システム統括 (本陣)"

  llamacpp:
    endpoint: "http://192.168.11.232:8080"
    model_path: "models/nemotron/Nemotron-3-Nano.gguf"
    threads: 6
    context_size: 8192
    batch_size: 512
    mlock: true
    mmap: true

  litellm:
    endpoint: "http://localhost:8000"
    features:
      - "Context compression"
      - "Multi-API integration"

# --- Proxmox コンテナ設定 ---
proxmox:
  containers:
    ct_100:
      name: "本陣 (EliteDesk)"
      role: "System orchestration"
      disk: "10GB"
      ram: "2GB"
      cpu: 2
      description: "調整専用、モデル無し"

    ct_101:
      name: "隠密 (ProDesk 600)"
      role: "Local LLM inference"
      disk: "20GB"
      ram: "20GB"
      cpu: 6
      description: "llama.cpp + Nemotron-3-Nano"

# --- パフォーマンス目標 ---
performance_targets:
  v11_4:
    simple:
      time_seconds: 2
      route: "家老-B Groq Llama 3.3 70B"
      cost_yen: 0

    medium:
      time_seconds: "8-12"
      route: "参謀-B Grok-code-fast-1"
      cost_yen: "0.01-0.05"

    complex:
      time_seconds_no_correction: "20-30"
      time_seconds_with_correction: "35-50"
      route: "軍師 o3-mini PDCA: Plan→Do(参謀並列)→Check→Act"
      cost_yen: "0.10-0.30"

    strategic:
      time_seconds: 45
      route: "大元帥 Claude Opus 4.5"
      cost_yen: "0-10"

    coding:
      time_seconds: "15-30"
      route: "将軍 Claude Sonnet 4.6"
      cost_yen: "0-5"

    confidential:
      time_seconds: "15-25"
      route: "隠密 Nemotron-3-Nano (Local)"
      cost_yen: 0

# --- コスト目標 ---
cost_targets:
  v11_4:
    monthly_yen: 3800
    breakdown:
      claude_pro: 3000
      claude_api: 140
      opus_premium: 200
      openai_o3mini_gpt5: 200
      xai_grok: 50
      gemini_flash: 80
      groq: 0
      electricity: 80

# --- 品質目標 ---
quality_targets:
  v11_4:
    simple: "85-90"
    medium: "88-92"
    complex_no_correction: "85-92"
    complex_with_correction: "90-95"
    strategic: "95-99"
    coding: "92-96"
    overall: "90-94"

# --- 開発環境 ---
development:
  primary_interface: "Discord"
  modes:
    battalion: "Full system (大元帥 + 将軍 + 軍師 + 参謀 + 家老 + 検校 + 隠密 + 足軽)"
    company: "Discord mode (参謀 + 家老 + 足軽)"
    platoon: "HA OS mode (隠密 + 足軽)"

  logging:
    level: "INFO"
    format: "structured"
    language: "ja"

# --- セキュリティ ---
security:
  secrets_detection: true
  code_validation: true
  security_keywords_monitoring:
    - "auth"
    - "authentication"
    - "payment"
    - "database"
    - "credential"

  opus_review_on_security: true
  confidential_to_onmitsu: true

# --- 記憶システム (3層) ---
memory_system:
  short_term:
    location: "Discord Thread"
    duration: "数日"

  medium_term:
    location: "Memory MCP (bushidan_memory.jsonl)"
    duration: "数週間〜数ヶ月"

  long_term:
    location: "Notion Database"
    duration: "永続"

# --- MCP権限マトリクス (v11.4) ---
mcp_permissions:
  config_file: "config/mcp_permissions.yaml"
  description: "役職別MCP使用権限・優先度設定"
  enabled: true

  access_levels:
    exclusive: "専属 - この役職のみ直接使用可能"
    primary: "優先 - 他役職も使用可能だが優先される"
