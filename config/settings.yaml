    shogun:
      primary_mcps: ["filesystem", "git"]
      purpose: "高難度コーディング・コード実装"

    gunshi:
      exclusive_mcps: ["sequential_thinking"]
      primary_mcps: ["filesystem", "git", "graph_memory"]
