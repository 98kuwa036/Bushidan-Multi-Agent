# =============================================================
# 武士団マルチエージェントシステム v10 - Configuration
# =============================================================
# "5層ハイブリッドアーキテクチャ + 軍師(Gunshi) + BDI Framework"
# =============================================================

system:
  name: "Bushidan Multi-Agent System"
  version: "10.0"
  language: "ja"
  philosophy: "シンプル・イズ・ベスト + 実用性第一 + 汎用性の追求"
  subtitle: "5-Tier Hybrid Architecture with Gunshi + BDI Framework + llama.cpp"

# --- BDI Framework Configuration (v9.4) ---
bdi_framework:
  enabled: true
  description: "Belief-Desire-Intention framework for formal multi-agent theory"
  default_mode: true  # v9.4: BDI enabled by default

  features:
    - "Formal semantics: Perceive → Deliberate → Plan → Execute → Reconsider"
    - "Belief management with consistency checking"
    - "Goal-directed deliberation with priority-based selection"
    - "Explicit plan generation and tracking"
    - "Japanese logging throughout"
    - "Backward compatible with existing agents"

  shogun_bdi:
    enabled: true
    strategic_desires:
      maintain_quality:
        type: "maintenance"
        priority: 0.9
        description: "Maintain high quality standards (95+ points)"
      optimize_cost:
        type: "optimization"
        priority: 0.7
        description: "Optimize cost while maintaining quality"
      ensure_security:
        type: "constraint"
        priority: 0.95
        description: "Ensure security for sensitive operations"
      learn_and_improve:
        type: "exploration"
        priority: 0.6
        description: "Learn from past decisions"
        requires: ["memory_mcp"]

  gunshi_bdi:
    enabled: true
    strategic_planning_desires:
      accurate_planning:
        type: "achievement"
        priority: 0.95
        description: "Generate accurate, actionable strategy plans"
      code_quality:
        type: "maintenance"
        priority: 0.9
        description: "Ensure code quality through architectural review"
      efficient_decomposition:
        type: "optimization"
        priority: 0.85
        description: "Decompose complex tasks into implementable units"
      risk_mitigation:
        type: "maintenance"
        priority: 0.8
        description: "Identify and mitigate technical risks"

  karo_bdi:
    enabled: true
    tactical_desires:
      efficient_decomposition:
        type: "optimization"
        priority: 0.9
        description: "Decompose tasks efficiently"
      maximize_parallelization:
        type: "optimization"
        priority: 0.8
        description: "Maximize parallel execution"
      maintain_coordination_quality:
        type: "maintenance"
        priority: 0.85
        description: "High quality result integration"

  taisho_bdi:
    enabled: true
    implementation_desires:
      correct_implementation:
        type: "achievement"
        priority: 1.0
        description: "Generate correct, working code"
      efficient_execution:
        type: "optimization"
        priority: 0.7
        description: "Minimize resource usage"
      quality_validation:
        type: "achievement"
        priority: 0.85
        description: "Validate code quality"
      self_healing_recovery:
        type: "maintenance"
        priority: 0.8
        description: "Automatically fix errors"

# --- v10 革新的機能 ---
v10_innovations:
  gunshi_layer:
    enabled: true
    description: "軍師 (Gunshi) 作戦立案層 - Qwen3-Coder-Next 80B-A3B API"
    model: "qwen3-coder-next"
    capabilities:
      - "256K コンテキスト (コードベース全体を俯瞰)"
      - "SWE-Bench Verified 70.6%"
      - "Non-thinking mode (即断即決)"
      - "Ultra-sparse MoE (512 experts, 10 activated)"
      - "80B total / 3B active params (コスト効率が高い)"
    responsibilities:
      - "COMPLEX タスクの作戦立案"
      - "コードアーキテクチャ監査"
      - "タスク分解 (サブタスクへの分割)"
      - "実装結果のレビュー"
    api_providers:
      - "DashScope (Alibaba Cloud)"
      - "OpenRouter"

  llamacpp_cpu:
    enabled: true
    description: "llama.cpp CPU最適化（HP ProDesk 600対応、Ollama不要）"
    benefits:
      - "AVX2, FMA, F16C CPU命令活用"
      - "メモリロック（mlock）でスワップ防止"
      - "ネイティブC++（Goオーバーヘッド無し）"
      - "HP ProDesk 600完全対応"
    expected_speed: "15-25 tok/s (i7-10700 CPU)"

  intelligent_routing:
    enabled: true
    description: "運用黄金律 v10 に基づくインテリジェント・ルーティング"
    golden_rules:
      - "Simple → Groq (instant, free, DON'T wake Qwen)"
      - "Medium → Local Qwen3 llama.cpp (local volume, ¥0)"
      - "Complex → Gunshi (Qwen3-Coder-Next API, 作戦立案)"
      - "Strategic → Shogun (final authority)"
    complexity_judgment:
      simple: "Questions, lookups (<50 chars, no code) → Groq"
      medium: "Standard implementation (code keywords) → Local Qwen3"
      complex: "Multi-component (multiple files) → Gunshi → Local → Cloud → Gemini"
      strategic: "Design decisions (strategic keywords) → Shogun"

  fallback_chains:
    enabled: true
    description: "多段フォールバック・チェーン（99.5%信頼性）"
    chains:
      simple:
        primary: "Groq (300-500 tok/s, free)"
        fallback: "Gemini 3 Flash"
      medium:
        primary: "Local Qwen3 llama.cpp (4096 context, ¥0)"
        shadow: "Cloud Qwen3-plus (32k context, ¥3)"
        final_defense: "Gemini 3 Flash (¥0.04)"
      complex:
        primary: "Gunshi (Qwen3-Coder-Next API, 256K context)"
        fallback_1: "Local Qwen3 llama.cpp (¥0)"
        fallback_2: "Cloud Qwen3-plus (¥3)"
        final_defense: "Gemini 3 Flash (¥0.04)"

  prompt_caching:
    enabled: true
    description: "Claude Prompt Caching（90%コスト削減）"
    technology: "Anthropic Prompt Caching API"

  power_optimization:
    enabled: true
    description: "電力最適化（Qwen起動制御）"
    strategy: "Simple タスクは Groq で処理し Qwen を起こさない"

# --- リポジトリ同期 ---
repo:
  local_base: "/home/claude"
  github_remote: ""  # git remote から自動取得
  sync_interval_min: 5

# --- 将軍 (Shogun) - Strategic Layer ---
shogun:
  codename: "Shogun"
  role: "将軍 - 大局的設計図・難解エラー最終判断・品質保証"
  model: "claude-sonnet-4-5-20250929"
  opus_model: "claude-opus-4-20250514"

  prompt_caching:
    enabled: true
    cache_ttl_minutes: 5
    system_prompt_caching: true

  pro_cli:
    enabled: true
    monthly_limit: 2000
    model: "sonnet"

  review_system:
    enabled: true
    levels:
      basic:
        target: ["simple", "medium"]
        model: "sonnet"
        cost_yen: 0
      detailed:
        target: ["complex"]
        model: "sonnet"
        cost_yen: "0-5"
      premium:
        target: ["strategic"]
        model: "opus-4"
        cost_yen: 10

  opus_triggers:
    - "task_complexity == STRATEGIC"
    - "risk_level in [HIGH, CRITICAL]"
    - "security_vulnerabilities detected"
    - "security keywords: auth, payment, database"
    - "user_request == true"

# --- 軍師 (Gunshi) - Strategy Planning Layer (v10) ---
gunshi:
  codename: "Gunshi"
  role: "軍師 - 作戦立案・コードアーキテクチャ監査・複雑タスク分解"
  model: "qwen3-coder-next"
  total_params: "80B"
  active_params: "3B"
  context_window: 262144  # 256K
  swe_bench: "70.6%"

  api:
    primary_provider: "dashscope"
    providers:
      dashscope:
        base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
        model_name: "qwen3-coder-next"
      openrouter:
        base_url: "https://openrouter.ai/api/v1"
        model_name: "qwen/qwen3-coder-next"
    temperature: 0.3  # 低め = 正確な戦略立案
    max_tokens: 8192  # 長めの分析を許容

  modes:
    strategy: "複雑タスクの実行計画立案"
    audit: "コードアーキテクチャ監査"
    decompose: "タスク分解 (サブタスクへの分割)"
    advise: "技術的助言"

  activation_triggers:
    - "task_complexity == COMPLEX"
    - "code_review_requested"
    - "multi_file_changes"
    - "architecture_related"

# --- 家老 (Karo) - Tactical Layer ---
karo:
  codename: "Karo"
  role: "家老 - タスク分解・最終防御線"

  dynamic_selection:
    enabled: true
    groq:
      model: "llama-3.3-70b-versatile"
      use_case: "Simple tasks (instant speed)"
      speed: "300-500 tok/s"
      cost_yen: 0

    gemini3:
      model: "gemini-3.0-flash"
      use_case: "Final defense line (fallback)"
      cost_yen: 0.04

# --- 大将 (Taisho) - Implementation Layer ---
taisho:
  codename: "Taisho"
  role: "大将 - 実務実装・MCP駆使"

  # v9.4: llama.cpp (replaces Ollama)
  local:
    backend: "llama.cpp"
    model: "Qwen3-Coder-30B-Q4_K_M.gguf"
    endpoint: "http://127.0.0.1:8080"
    context_length: 4096
    quantization: "Q4_K_M"
    threads: 8  # HP ProDesk 600: i7 8 cores
    batch_size: 512
    mlock: true
    expected_speed: "15-25 tok/s (CPU)"
    cost_yen: 0
    power_cost_yen: 3  # CPU is more efficient
    optimizations:
      - "llama.cpp CPU native (AVX2, FMA)"
      - "Memory lock (mlock) prevents swap"
      - "No Ollama overhead"
      - "HP ProDesk 600 optimized"

  # Shadow: Cloud Qwen3-plus (Kagemusha)
  kagemusha:
    enabled: true
    model: "qwen3-coder-plus"
    provider: "Alibaba Cloud Model Studio"
    context_length: 32000
    activation_triggers:
      - "Local Qwen3 fails"
      - "Context > 4096 tokens"
      - "Complex task requiring more capacity"
    cost_yen: 3
    description: "影武者（Shadow backup）for seamless continuation"

  # Final fallback: Gemini 3 Flash
  final_defense:
    model: "gemini-3.0-flash"
    activation: "When both Local & Cloud Qwen3 fail"
    cost_yen: 0.04

# --- 足軽 (Ashigaru) - Execution Layer ---
ashigaru:
  codename: "Ashigaru"
  role: "足軽 - MCP実行・並列処理"

  members:
    - name: "filesystem"
      type: "MCP"
      role: "ファイル読み書き"

    - name: "git"
      type: "MCP"
      role: "バージョン管理"

    - name: "memory"
      type: "MCP"
      role: "知識保持・Web検索キャッシュ"

    - name: "web_search"
      type: "MCP"
      role: "最新情報取得"
      technology: "Tavily + Playwright"

    - name: "groq"
      type: "API"
      role: "瞬速実行（Simple tasks）"
      model: "llama-3.3-70b-versatile"

# --- インフラ設定 ---
infrastructure:
  mode: "hybrid"
  description: "クラウドの知能・速度 + ローカルの物量・コスト0"

  local:
    hardware: "HP ProDesk 600"
    cpu: "Intel Core i5-10500 / i7-10700 (6-8C)"
    ram: "16-32GB DDR4"
    gpu: "なし（CPU推論）"
    os: "Ubuntu 22.04/24.04 LTS"

  # v9.4: llama.cpp (replaces Ollama)
  llamacpp:
    endpoint: "http://127.0.0.1:8080"
    model_path: "models/qwen3/Qwen3-Coder-30B-Q4_K_M.gguf"
    threads: 8
    context_size: 4096
    batch_size: 512
    mlock: true
    mmap: true

  # Legacy (unused in v9.4)
  # ollama:
  #   endpoint: "http://localhost:11434"

  litellm:
    endpoint: "http://localhost:8000"
    features:
      - "Context compression (<4k)"
      - "Multi-API integration"

# --- Proxmox コンテナ設定 ---
proxmox:
  containers:
    ct_100:
      name: "本陣"
      role: "System orchestration"
      disk: "10GB"
      ram: "2GB"
      cpu: 2
      description: "調整専用、モデル無し"

    ct_101:
      name: "Qwen3"
      role: "Local LLM inference"
      disk: "45GB"
      ram: "24GB"
      cpu: 8
      description: "llama.cpp + Qwen3-Coder-30B (~17GB model)"
      storage_breakdown:
        model: "17GB"
        llamacpp: "3GB"
        dependencies: "5GB"
        os_overhead: "10GB"
        free_space: "10GB"

# --- パフォーマンス目標 ---
performance_targets:
  v10:
    simple:
      time_seconds: 2
      route: "Groq"
      cost_yen: 0

    medium:
      time_seconds: 15  # CPU is slower than GPU
      route: "Local Qwen3 llama.cpp"
      cost_yen: 0

    complex:
      time_seconds: 25
      route: "Gunshi → Local Qwen3 → Cloud → Gemini"
      cost_yen: "0-3"

    strategic:
      time_seconds: 45
      route: "Shogun"
      cost_yen: "0-5"

# --- コスト目標 ---
cost_targets:
  v10:
    monthly_yen: 3600
    breakdown:
      claude_pro: 3000
      claude_api: 140
      opus_premium: 100
      gemini_3_flash: 120
      alibaba_cloud: 60
      qwen3_coder_next: 100  # 軍師 API (3B active = cheap)
      groq: 0
      electricity: 80  # CPU more efficient

# --- 品質目標 ---
quality_targets:
  v10:
    overall: "97-98"
    simple: "90-93"  # Groq
    medium: "95-97"  # Local Qwen3
    complex: "97-99"  # Gunshi + fallback chain
    strategic: "98-99.5"  # Opus Premium

# --- 開発環境 ---
development:
  primary_interface: "Slack"
  modes:
    battalion: "Full system (Shogun + Gunshi + Karo + Taisho + Ashigaru)"
    company: "Slack mode (Karo + Taisho + Ashigaru)"
    platoon: "HA OS mode (Taisho + Dynamic Ashigaru)"

  logging:
    level: "INFO"
    format: "structured"
    language: "ja"  # v9.4: Japanese logging

# --- セキュリティ ---
security:
  secrets_detection: true
  code_validation: true
  security_keywords_monitoring:
    - "auth"
    - "authentication"
    - "payment"
    - "database"
    - "credential"

  opus_review_on_security: true

# --- 記憶システム (3層) ---
memory_system:
  short_term:
    location: "Slack Thread"
    duration: "数日"

  medium_term:
    location: "Memory MCP (bushidan_memory.jsonl)"
    duration: "数週間〜数ヶ月"

  long_term:
    location: "Notion Database"
    duration: "永続"
