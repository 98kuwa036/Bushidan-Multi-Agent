    onmitsu:
      exclusive_mcps: ["filesystem"]
      purpose: "機密情報処理・ローカル完結"

    ashigaru:
      delegated_mcps: ["filesystem", "git", "playwright", "prisma"]
      purpose: "上位役職の指示に基づく実行"

  agent_instructions:
