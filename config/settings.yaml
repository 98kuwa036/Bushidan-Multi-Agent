    sanbo:
      primary_mcps: ["filesystem", "git"]
      purpose: "コード実装・バグ修正"

    karo:
      primary_mcps: ["sequential_thinking"]
      purpose: "タスク分解・調整・進捗報告"

    kengyo:
      exclusive_mcps: ["playwright"]
      primary_mcps: ["filesystem"]
