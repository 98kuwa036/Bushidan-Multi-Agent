name: Claude Assistant

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude-response:
    # Bot・外部投稿者（author_association=NONE）からのトリガーを除外
    if: |
      github.actor != 'dependabot[bot]' &&
      github.event.sender.type == 'User' &&
      (github.event_name != 'issue_comment' || github.event.issue.author_association != 'NONE') &&
      (github.event_name != 'pull_request_review_comment' || github.event.comment.author_association != 'NONE')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.11"

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: "@claude"
          # 修正箇所: claude_args ではなく model を直接指定します
          model: "claude-sonnet-4-5-20250929"
